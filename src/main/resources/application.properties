# ============================================================
# INSURANCE POLICY SERVICE - APPLICATION CONFIGURATION
# ============================================================
# Usar variables de entorno desde .env

# APPLICATION
spring.application.name=${SPRING_APPLICATION_NAME:insurance-policy-service}

# ============================================================
# DATABASE CONFIGURATION
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:insurance_db}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVERCLASSNAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# H2 Console
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}

# ============================================================
# JPA / HIBERNATE CONFIGURATION
# ============================================================
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOWSQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/api/v1}
server.compression.enabled=true
server.compression.min-response-size=1024

# ============================================================
# LOGGING CONFIGURATION
# ============================================================
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.insurance=${LOGGING_LEVEL_COM_INSURANCE:DEBUG}
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:DEBUG}
logging.level.org.springframework.web=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:INFO}
logging.level.org.springframework.boot.actuate=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_BOOT_ACTUATE:INFO}
logging.level.org.hibernate=${LOGGING_LEVEL_ORG_HIBERNATE:WARN}
logging.file.name=${LOGGING_FILE:logs/insurance-policy-service.log}
logging.file.max-size=10MB
logging.file.max-history=10

# ============================================================
# ACTUATOR / HEALTH CHECK
# ============================================================
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:when-authorized}
management.endpoints.web.base-path=/actuator

# ============================================================
# SWAGGER / SPRINGDOC-OPENAPI
# ============================================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=true

# ============================================================
# APPLICATION CUSTOM PROPERTIES
# ============================================================
app.version=${APP_VERSION:1.0.0}
app.description=${APP_DESCRIPTION:Backend para gestión de clientes y pólizas de seguros}
app.jwt.secret=${JWT_SECRET:your-super-secret-key-change-in-production-minimum-256-bits-required}
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Content-Type,Authorization,X-Requested-With}
app.cors.max-age=${CORS_MAX_AGE:3600}

# ============================================================
# JACKSON - JSON SERIALIZATION
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=false
spring.jackson.default-property-inclusion=non_null

# ============================================================
# SECURITY HEADERS (será configurado en Spring Security)
# ============================================================
# Configurado programáticamente en SecurityConfig.java

